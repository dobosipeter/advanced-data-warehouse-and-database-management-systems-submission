services:
  db:
    image: postgres:16
    container_name: air-quality-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-air_quality}
      POSTGRES_USER: ${POSTGRES_USER:-air_quality}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-air_quality} -d ${POSTGRES_DB:-air_quality}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    image: air-quality-api:dev
    container_name: air-quality-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://air_quality:change-me@db:5432/air_quality}
      NO_PROXY: localhost,127.0.0.1,db,api,frontend,reverse-proxy
      no_proxy: localhost,127.0.0.1,db,api,frontend,reverse-proxy
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), timeout=5).close()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    image: air-quality-frontend:dev
    container_name: air-quality-frontend
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NO_PROXY: localhost,127.0.0.1,db,api,frontend,reverse-proxy
      no_proxy: localhost,127.0.0.1,db,api,frontend,reverse-proxy
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8501), timeout=5).close()"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./workers
    image: air-quality-worker:dev
    container_name: air-quality-worker
    command: python ingest.py --help
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://air_quality:change-me@db:5432/air_quality}
      NO_PROXY: localhost,127.0.0.1,db,api,frontend,reverse-proxy
      no_proxy: localhost,127.0.0.1,db,api,frontend,reverse-proxy
    volumes:
      - ./workers:/app
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  reverse-proxy:
    image: caddy:2
    container_name: air-quality-proxy
    environment:
      NO_PROXY: localhost,127.0.0.1,db,api,frontend,reverse-proxy
      no_proxy: localhost,127.0.0.1,db,api,frontend,reverse-proxy
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
